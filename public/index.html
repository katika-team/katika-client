<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Skibag - Get Started</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 20px;
      }

      .container {
        max-width: 420px;
        width: 100%;
      }

      .logo {
        font-size: 56px;
        text-align: center;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 32px;
        text-align: center;
        margin-bottom: 8px;
        color: #fff;
      }

      .subtitle {
        text-align: center;
        color: #aaa;
        margin-bottom: 30px;
        font-size: 16px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #ccc;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 16px;
        transition: border-color 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #3b48b9;
      }

      input::placeholder {
        color: #666;
      }

      .password-wrapper {
        position: relative;
      }

      .password-wrapper input {
        padding-right: 50px;
      }

      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 18px;
        padding: 4px;
      }

      .toggle-password:hover {
        color: #aaa;
      }

      .btn {
        width: 100%;
        background: #3b48b9;
        color: white;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          background 0.2s;
        margin-top: 10px;
      }

      .btn:hover {
        transform: scale(1.02);
        background: #4a56c9;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .error {
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .success {
        text-align: center;
        display: none;
      }

      .success-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      .success h2 {
        font-size: 28px;
        margin-bottom: 16px;
        color: #4ade80;
      }

      .success p {
        color: #aaa;
        margin-bottom: 12px;
        line-height: 1.6;
      }

      .ref-code-display {
        background: rgba(59, 72, 185, 0.2);
        border: 1px solid #3b48b9;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 24px;
        text-align: center;
      }

      .ref-code-display span {
        color: #818cf8;
        font-weight: 600;
        font-size: 20px;
      }

      .download-section {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 24px;
        margin-top: 24px;
      }

      .download-section h3 {
        font-size: 18px;
        margin-bottom: 16px;
      }

      .download-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      .download-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #222;
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: transform 0.2s;
      }

      .download-btn:hover {
        transform: scale(1.05);
      }

      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

  <body>
    <div class="container">
      <div id="signupForm">
        <div class="logo">🎮</div>
        <h1>Join Skibag</h1>
        <p class="subtitle">Create your account and start playing</p>

        <div class="error" id="error"></div>

        <form id="form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6" autocomplete="new-password" />
              <button type="button" class="toggle-password" id="togglePassword">👁️</button>
            </div>
          </div>

          <div class="form-group">
            <label for="referralCode">Referral ID</label>
            <input type="text" id="referralCode" name="referralCode" placeholder="Enter referral code (optional)" />
          </div>

          <button type="submit" class="btn" id="submitBtn">Create Account</button>
        </form>
      </div>

      <div id="successScreen" class="success">
        <div class="success-icon">✅</div>
        <h2>Account Created!</h2>

        <div class="ref-code-display" id="refCodeDisplay">
          <p style="margin-bottom: 8px">Your Referral Code:</p>
          <span id="displayedRefCode"></span>
        </div>

        <p>Share this code with friends to earn rewards!</p>

        <p>Your account has been created successfully.</p>
        <p>Download the Skibag app to start playing!</p>

        <div class="download-section">
          <h3>📱 Download the App</h3>
          <div class="download-buttons">
            <a href="https://apps.apple.com" target="_blank" class="download-btn"> 🍎 App Store </a>
            <a href="https://play.google.com" target="_blank" class="download-btn"> 🤖 Play Store </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // ============================================
      // CONFIGURATION
      // ============================================

      const SUPABASE_URL = "https://bvvosplyvnkdtsiqokoq.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2dm9zcGx5dm5rZHRzaXFva29xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTMzMzIsImV4cCI6MjA4ODM2OTMzMn0.Wdjrim4gb5aunY8AUFtQEesFbFJvRwKqNczV4nexT1w";

      const supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      // ============================================
      // REFERRAL CODE HANDLING
      // ============================================

      // Get referral code from URL query parameter
      const urlParams = new URLSearchParams(window.location.search);
      const refCode = urlParams.get("ref");

      // Pre-fill the referral code field if in URL
      if (refCode) {
        document.getElementById("referralCode").value = refCode;
      }

      // ============================================
      // PASSWORD TOGGLE
      // ============================================

      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
        togglePassword.textContent = type === "password" ? "👁️" : "🙈";
      });

      // ============================================
      // GENERATE REFERRAL CODE
      // ============================================

      function generateReferralCode() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let code = "";
        for (let i = 0; i < 8; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }

      // ============================================
      // FORM HANDLING
      // ============================================

      const form = document.getElementById("form");
      const submitBtn = document.getElementById("submitBtn");
      const errorDiv = document.getElementById("error");
      const signupForm = document.getElementById("signupForm");
      const successScreen = document.getElementById("successScreen");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document
          .getElementById("email")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("password").value;

        // Get referral code from URL or form input
        const referralCode =
          urlParams.get("ref") ||
          document.getElementById("referralCode").value.trim();

        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<span class="spinner"></span>Creating account...';
        errorDiv.style.display = "none";

        try {
          // Sign up with Supabase Auth
          const { data: authData, error: authError } =
            await supabase.auth.signUp({
              email: email,
              password: password,
              options: {
                data: {
                  username: username,
                },
              },
            });

          if (authError) {
            throw authError;
          }

          if (authData.user) {
            // Generate a static referral code for this user
            const myReferralCode = generateReferralCode();

            // Create user profile with referral info
            await supabase.from("users").insert({
              id: authData.user.id,
              email: email,
              username: username,
              referral_code: myReferralCode,
              referred_by: referralCode || null,
              coins: 0,
              points: 0,
              created_at: new Date().toISOString(),
            });

            // If there was a referral code, record the referral for the referrer
            if (referralCode) {
              try {
                // Find the referrer's user ID from their referral code
                const { data: referrerData } = await supabase
                  .from("users")
                  .select("id")
                  .eq("referral_code", referralCode)
                  .single();

                if (referrerData) {
                  // Record the referral
                  await supabase.from("referrals").insert({
                    referrer_code: referralCode,
                    referred_user_id: authData.user.id,
                    referred_email: email,
                    referred_name: username,
                    status: "completed",
                  });

                  // Give bonus to referrer (optional - you can customize this)
                  await supabase
                    .from("users")
                    .update({ points: 100 })
                    .eq("id", referrerData.id);
                }
              } catch (referralError) {
                console.log(
                  "Referral recording failed:",
                  referralError.message,
                );
              }
            }

            // Show success screen with user's new referral code
            showSuccessScreen(myReferralCode);
          }
        } catch (error) {
          errorDiv.textContent =
            error.message || "An error occurred. Please try again.";
          errorDiv.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Account";
        }
      });

      function showSuccessScreen(myReferralCode) {
        signupForm.style.display = "none";
        successScreen.style.display = "block";

        // Show user's new referral code
        document.getElementById("displayedRefCode").textContent =
          myReferralCode;
      }
    </script>
    <div id="bootsplash">
      <div id="bootsplash-logo"></div>
    </div>
  </body>
</html>
